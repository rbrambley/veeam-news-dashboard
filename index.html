<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veeam News Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
        }
        .header {
            background-color: #0a7cba;
            padding: 10px;
            text-align: center;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin: 20px;
        }
        .tab {
            margin: 0 10px;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #FBCB3E;
            color: #1e1e1e;
            border: none;
            border-radius: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background-color: #2e2e2e;
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }
        .dark-mode-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Veeam News Dashboard</h1>
        <button class="dark-mode-toggle">Toggle Dark Mode</button>
    </div>
    <div class="tabs">
        <button class="tab">All</button>
        <button class="tab">Blog</button>
        <button class="tab">KB</button>
        <button class="tab">Advisories</button>
        <button class="tab">Releases</button>
        <button class="tab">Community</button>
    </div>
    <div class="grid" id="news-container"></div>
    <script>
        async function fetchNews() {
            const response = await fetch('news.json');
            const news = await response.json();
            return news;
        }

        function renderNews(newsItems) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            newsItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h2>${item.title}</h2><p>${item.content}</p>`;
                container.appendChild(card);
            });
        }

        document.querySelector('.dark-mode-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        fetchNews().then(renderNews);
    </script>
</body>
</html>
